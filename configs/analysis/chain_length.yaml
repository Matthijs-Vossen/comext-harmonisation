analysis_type: chain_length

years:
  min_year: 1988
  max_year: 2024
  backward_anchor: 1988
  forward_anchor: 2024

measures:
  weights_source: VALUE_EUR
  analysis_measure: VALUE_EUR

metrics: ["r2_45_weighted_symmetric", "mae_weighted", "exposure_weighted", "diffuseness_weighted", "diffuse_exposure"]

sample:
  exclude_reporters: []
  exclude_partners: []
  sample_mode: max_chain

paths:
  annual_base_dir: data/extracted_annual_no_confidential/products_like
  weights_dir: outputs/weights/adjacent
  output_dir: outputs/analysis/chain_length_new

plot:
  output_path: outputs/analysis/chain_length_new/chain_length.png
  title: null
  point_color: black
  point_size: 3.0
  use_latex: true
  latex_preamble: "\\usepackage{newtxtext,newtxmath}"
