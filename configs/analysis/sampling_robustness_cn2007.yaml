analysis_type: sampling_robustness

break:
  period: "20062007"
  direction: "b_to_a"

measures:
  estimation_measure: VALUE_EUR

flow:
  flow_code: "1"

paths:
  concordance_path: data/concordances/CN_concordances_1988_2025_XLS_FORMAT.xls
  concordance_sheet: null
  annual_base_dir: data/extracted_annual_no_confidential/products_like
  output_dir: outputs/analysis/sampling_robustness_cn2007

sample:
  exclude_reporters: []
  exclude_partners: []

run:
  n_bins: 20
  seed: 20260317

plot:
  output_path: outputs/analysis/sampling_robustness_cn2007/sampling_robustness.png
  point_alpha: 0.45
  point_size: 8
  point_color: "black"
  histogram_bins: 20
  use_latex: true
  latex_preamble: "\\usepackage{newtxtext,newtxmath}"
